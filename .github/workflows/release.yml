name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build

      - name: Sync manifest.json version from package.json
        run: node -e "const m=JSON.parse(require('fs').readFileSync('manifest.json','utf8')); const p=JSON.parse(require('fs').readFileSync('package.json','utf8')); m.version=p.version; require('fs').writeFileSync('manifest.json', JSON.stringify(m,null,2)+'\n')"

      - name: Pack MCPB
        run: npx -y @anthropic-ai/mcpb pack

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.mcpb'
          generate_release_notes: true
